name: Sync Homebrew Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: hehehai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: homebrew-tap

      - name: Render brew formula
        run: bun run release:brew-formula -- --tap-dir ./homebrew-tap --version ${{ inputs.version }}

      - name: Commit brew formula
        working-directory: homebrew-tap
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git diff --quiet; then
            echo "No brew changes to publish"
            exit 0
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Formula/buke.rb
          git commit -m "buke ${VERSION}"
          git push
