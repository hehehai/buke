name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_apps:
        description: "Build and release popular apps"
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── CLI Release ─────────────────────────────────────────────
  release-cli:
    name: Release CLI
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Resolve version
        id: meta
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match packages/cli/package.json ($VERSION)" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        run: bun run release:prepare

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/release/v${{ steps.meta.outputs.version }}/*.tar.gz
            dist/release/v${{ steps.meta.outputs.version }}/*.zip
            dist/release/v${{ steps.meta.outputs.version }}/checksums.txt

      - name: Publish npm package
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: hehehai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: homebrew-tap

      - name: Render brew formula
        run: bun run release:brew-formula -- --tap-dir ./homebrew-tap --version ${{ steps.meta.outputs.version }}

      - name: Commit brew formula
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if git diff --quiet; then
            echo "No brew changes to publish"
            exit 0
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Formula/buke.rb
          git commit -m "buke ${VERSION}"
          git push

  # ── Read app list ───────────────────────────────────────────
  read-apps:
    name: Read App List
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && inputs.release_apps)
    outputs:
      apps: ${{ steps.read.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
      - name: Read default_app_list.json
        id: read
        run: |
          echo "apps=$(jq -c '.' default_app_list.json)" >> "$GITHUB_OUTPUT"

  # ── Build each app ──────────────────────────────────────────
  build-apps:
    name: Build ${{ matrix.app.name }}
    needs: [release-cli, read-apps]
    if: needs.read-apps.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.read-apps.outputs.apps) }}
    uses: ./.github/workflows/build-app.yml
    with:
      name: ${{ matrix.app.name }}
      config: ${{ matrix.app.config }}
      env: stable
