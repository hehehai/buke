name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: meta
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match packages/cli/package.json ($VERSION)" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        run: bun run release:prepare

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/release/v${{ steps.meta.outputs.version }}/*.tar.gz
            dist/release/v${{ steps.meta.outputs.version }}/*.zip
            dist/release/v${{ steps.meta.outputs.version }}/checksums.txt

      - name: Publish npm package
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: hehehai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: homebrew-tap

      - name: Render brew formula
        run: bun run release:brew-formula -- --tap-dir ./homebrew-tap --version ${{ steps.meta.outputs.version }}

      - name: Commit brew formula
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if git diff --quiet; then
            echo "No brew changes to publish"
            exit 0
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Formula/buke.rb
          git commit -m "buke ${VERSION}"
          git push
