name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting & lint
        run: bun run check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test packages/cli/src/__tests__/

  build:
    name: Build CLI
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build:cli

      - name: Smoke test
        run: bun run packages/cli/dist/index.js --help

  summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          {
            echo "# Quality Summary"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Lint & Format | ${{ needs.lint.result == 'success' && '✅ PASSED' || '❌ FAILED' }} |"
            echo "| Typecheck | ${{ needs.typecheck.result == 'success' && '✅ PASSED' || '❌ FAILED' }} |"
            echo "| Test | ${{ needs.test.result == 'success' && '✅ PASSED' || '❌ FAILED' }} |"
            echo "| Build CLI | ${{ needs.build.result == 'success' && '✅ PASSED' || '❌ FAILED' }} |"
          } >> $GITHUB_STEP_SUMMARY
