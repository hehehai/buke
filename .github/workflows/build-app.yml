name: Build Single App

on:
  workflow_dispatch:
    inputs:
      name:
        description: "App name"
        required: true
        default: "DeepSeek"
      config:
        description: "Path to buke.pack.json config file"
        required: true
        default: "packages/examples/deepseek/buke.pack.json"
      env:
        description: "Build environment"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - canary
          - stable
  workflow_call:
    inputs:
      name:
        description: "App name"
        type: string
        required: true
      config:
        description: "Path to buke.pack.json config file"
        type: string
        required: true
      env:
        description: "Build environment"
        type: string
        required: false
        default: "dev"

jobs:
  build:
    name: ${{ inputs.name }} (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            os: macos-latest
          # Electrobun currently builds for the host platform only.
          # Add more runners here when cross-compilation or other
          # platforms are supported.
          # - platform: macos-x64
          #   os: macos-13
          # - platform: linux-x64
          #   os: ubuntu-latest
          # - platform: windows-x64
          #   os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build:cli

      - name: Pack app
        run: |
          bun run packages/cli/dist/index.js pack \
            --config "${{ inputs.config }}" \
            --env "${{ inputs.env || 'dev' }}" \
            --out "output/${{ inputs.name }}" \
            --force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}-${{ matrix.platform }}
          path: output/${{ inputs.name }}/**
          retention-days: 7
          if-no-files-found: warn

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/${{ inputs.name }}/**
